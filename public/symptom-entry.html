<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>きょうの記録 - よりそい PHR</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .counter { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 12px 0; }
    .counter-btn {
      width: 52px; height: 52px; border-radius: 50%; border: 2px solid var(--brand-200);
      background: var(--white); font-size: 24px; color: var(--brand-600); cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .counter-btn:active { background: var(--brand-50); transform: scale(0.92); }
    .counter-value { font-size: 48px; font-weight: 700; color: var(--gray-800); min-width: 60px; text-align: center; }

    .scale-grid { display: grid; gap: 6px; }
    .scale-item {
      aspect-ratio: 1; border-radius: var(--radius-sm); border: 2px solid var(--gray-200);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; font-size: 12px; color: var(--gray-600); transition: all 0.15s;
    }
    .scale-item.selected { border-color: var(--brand-500); background: var(--brand-50); color: var(--brand-700); }
    .scale-item:active { transform: scale(0.92); }
    .scale-num { font-size: 18px; font-weight: 700; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--gray-100); }
    .toggle-label { font-size: 15px; font-weight: 600; }
    .toggle-switch { position: relative; width: 52px; height: 28px; cursor: pointer; }
    .toggle-switch input { display: none; }
    .toggle-track { width: 100%; height: 100%; border-radius: 14px; background: var(--gray-300); transition: background 0.2s; }
    .toggle-switch input:checked + .toggle-track { background: var(--danger); }
    .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 24px; height: 24px; border-radius: 50%; background: var(--white); box-shadow: var(--shadow-sm); transition: left 0.2s; }
    .toggle-switch input:checked ~ .toggle-thumb { left: 26px; }

    .done-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .done-card { background: var(--white); border-radius: var(--radius); padding: 32px; text-align: center; max-width: 300px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
  <div class="header">
    <button class="header-back" onclick="location.href='/symptom-log.html?disease='+getDiseaseId()">&larr;</button>
    <h1 id="page-title">きょうの記録</h1>
  </div>

  <div class="content">
    <!-- AI入力補助ボタン群 -->
    <div class="card" style="background:linear-gradient(135deg,#fef3c7,#fde68a);border:none;">
      <div style="font-size:12px;color:#92400e;font-weight:600;margin-bottom:8px;">⚡ かんたん入力</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <button class="btn btn-outline" id="btn-voice" style="padding:10px;font-size:13px;width:auto;">🎙 音声で記録</button>
        <button class="btn btn-outline" id="btn-chat" style="padding:10px;font-size:13px;width:auto;">💬 AIと会話</button>
      </div>
      <div id="btn-cgm-wrap" class="hidden mt-8">
        <button class="btn btn-outline" id="btn-cgm" style="padding:10px;font-size:13px;">📱 CGMレポートから読み取り</button>
      </div>
      <p style="font-size:10px;color:#92400e;margin-top:8px;opacity:0.8;">AIは入力を手伝うだけです。診断ではありません。</p>
    </div>

    <div id="metrics-container">
      <div class="loading"><div class="loading-spinner"></div><p class="mt-8 text-sm text-muted">読み込み中...</p></div>
    </div>

    <!-- メモ -->
    <div class="card">
      <div class="form-label">メモ（任意）</div>
      <textarea class="form-textarea" id="memo" placeholder="気になったことがあれば..." rows="2"></textarea>
    </div>

    <button class="btn btn-primary" id="save-btn">記録する</button>
    <div id="delete-section" class="hidden mt-16">
      <button class="btn btn-danger" id="delete-btn">この日の記録を削除</button>
    </div>
  </div>

  <!-- 音声入力オーバーレイ -->
  <div id="voice-overlay" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:300;display:flex;align-items:center;justify-content:center;">
    <div style="background:var(--white);border-radius:var(--radius);padding:32px 24px;max-width:340px;width:90%;text-align:center;">
      <div id="voice-mic" style="width:80px;height:80px;border-radius:50%;background:var(--brand-500);color:#fff;font-size:36px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;animation:pulse 1.5s infinite;">🎙</div>
      <div id="voice-status" style="font-size:14px;color:var(--gray-600);margin-bottom:12px;">話してください...</div>
      <div id="voice-text" style="background:var(--gray-50);padding:12px;border-radius:8px;min-height:60px;font-size:14px;text-align:left;margin-bottom:16px;"></div>
      <button class="btn btn-primary" id="voice-stop">話し終わった</button>
      <button class="btn" id="voice-cancel" style="background:none;color:var(--gray-500);margin-top:8px;">キャンセル</button>
    </div>
  </div>
  <style>@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:0.8}}</style>

  <div class="done-overlay hidden" id="done-overlay">
    <div class="done-card">
      <div style="font-size:48px; margin-bottom:12px">&#9989;</div>
      <div style="font-size:16px; font-weight:600; margin-bottom:16px">記録しました</div>
      <button class="btn btn-teal" onclick="location.href='/symptom-log.html?disease='+getDiseaseId()">閉じる</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="/js/liff-init.js"></script>
  <script src="/js/voice-input.js"></script>
  <script src="/js/photo-upload.js"></script>
  <script src="/js/ai-chat.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const targetDate = params.get("date") || new Date().toISOString().slice(0, 10);
    let metricValues = {};
    let currentTemplate = null;

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const { template } = await initLiff();
        currentTemplate = template;
        document.getElementById("page-title").textContent = formatDate(targetDate) + " の記録";

        // テンプレートからメトリクスUIを動的生成
        renderMetrics(template.symptomConfig?.metrics || []);

        // T1Dの場合はCGMボタンを表示
        if (template.id === "t1d") {
          document.getElementById("btn-cgm-wrap").classList.remove("hidden");
        }

        // 既存データ読み込み
        try {
          const all = await apiGet("/api/symptoms?days=90");
          const match = all.find((l) => l.date === targetDate);
          if (match) loadExisting(match, template.symptomConfig?.metrics || []);
        } catch (e) { console.warn("Load error:", e.message); }

        setupSaveDelete();
        setupAIButtons();
      } catch (err) {
        console.error("Init error:", err);
      }
    });

    // === AIボタンのセットアップ ===
    function setupAIButtons() {
      // 音声入力
      document.getElementById("btn-voice").addEventListener("click", startVoiceInput);
      // チャット
      document.getElementById("btn-chat").addEventListener("click", startChat);
      // CGM
      const cgmBtn = document.getElementById("btn-cgm");
      if (cgmBtn) cgmBtn.addEventListener("click", startCGMScan);
    }

    function startVoiceInput() {
      if (!VoiceInput.isSupported()) {
        alert("このブラウザは音声入力に対応していません。Chrome/Safariでお試しください。");
        return;
      }
      const overlay = document.getElementById("voice-overlay");
      const textEl = document.getElementById("voice-text");
      const statusEl = document.getElementById("voice-status");
      textEl.textContent = "";
      overlay.classList.remove("hidden");

      const vi = new VoiceInput({
        onInterim: (interim, finalText) => { textEl.textContent = finalText + interim; },
        onFinal: async (finalText) => {
          if (!finalText.trim()) {
            overlay.classList.add("hidden");
            return;
          }
          statusEl.textContent = "AIが内容を整理しています...";
          try {
            const res = await apiPost("/api/ai/parse-symptom", { text: finalText, diseaseId: getDiseaseId() });
            overlay.classList.add("hidden");
            applyAIResult(res.result, finalText);
          } catch (err) {
            alert("解析に失敗しました: " + err.message);
            overlay.classList.add("hidden");
          }
        },
        onError: (err) => {
          alert("音声エラー: " + err.message);
          overlay.classList.add("hidden");
        },
      });

      document.getElementById("voice-stop").onclick = () => vi.stop();
      document.getElementById("voice-cancel").onclick = () => {
        vi.stop();
        overlay.classList.add("hidden");
      };
      vi.start();
    }

    function startChat() {
      showChatOverlay({
        diseaseId: getDiseaseId(),
        onComplete: (collected) => {
          applyAIResult(collected, null);
        },
      });
    }

    async function startCGMScan() {
      showPhotoPicker({
        onSelect: async (dataUri) => {
          try {
            showToast("CGMレポートを読み取り中...");
            const res = await apiPost("/api/ai/scan-cgm", { image: dataUri });
            hideToast();
            applyAIResult(res.values, null);
            showToast("読み取り完了", 2000);
          } catch (err) {
            hideToast();
            alert("読み取りに失敗しました: " + err.message);
          }
        },
      });
    }

    function applyAIResult(result, memoText) {
      if (!result) return;
      const metrics = currentTemplate?.symptomConfig?.metrics || [];
      let appliedCount = 0;
      metrics.forEach((m) => {
        if (result[m.id] != null) {
          metricValues[m.id] = result[m.id];
          if (m.type === "counter") {
            const el = document.getElementById(`val-${m.id}`);
            if (el) el.textContent = result[m.id];
          } else if (m.type === "scale") {
            selectScale(m.id, result[m.id]);
          } else if (m.type === "toggle") {
            const cb = document.getElementById(`toggle-${m.id}`);
            if (cb) { cb.checked = !!result[m.id]; cb.dispatchEvent(new Event("change")); }
          }
          appliedCount++;
        }
      });
      if (memoText || result.memo) {
        const memoEl = document.getElementById("memo");
        memoEl.value = result.memo || memoText || "";
      }
      showToast(`${appliedCount}項目をプレ入力しました。確認して保存してください`, 3500);
    }

    // シンプルなトースト
    let toastEl = null;
    function showToast(msg, duration = 0) {
      if (!toastEl) {
        toastEl = document.createElement("div");
        toastEl.style.cssText = "position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:500;";
        document.body.appendChild(toastEl);
      }
      toastEl.textContent = msg;
      toastEl.style.display = "block";
      if (duration > 0) setTimeout(hideToast, duration);
    }
    function hideToast() { if (toastEl) toastEl.style.display = "none"; }

    function renderMetrics(metrics) {
      const container = document.getElementById("metrics-container");
      let html = "";

      metrics.forEach((m) => {
        html += '<div class="card">';

        if (m.type === "counter") {
          metricValues[m.id] = m.default || 0;
          html += `
            <div class="form-label" style="text-align:center; margin-bottom:4px">${escapeHtml(m.label)}</div>
            <div class="counter">
              <button class="counter-btn" onclick="adjustCounter('${m.id}', -1, ${m.min || 0}, ${m.max || 99})">&minus;</button>
              <div class="counter-value" id="val-${m.id}">${m.default || 0}</div>
              <button class="counter-btn" onclick="adjustCounter('${m.id}', 1, ${m.min || 0}, ${m.max || 99})">+</button>
            </div>`;
        } else if (m.type === "scale") {
          metricValues[m.id] = null;
          const cols = m.max - m.min + 1;
          html += `<div class="form-label">${escapeHtml(m.label)}</div>`;
          if (m.description) html += `<p class="text-sm text-muted mb-8">${escapeHtml(m.description)}</p>`;
          html += `<div class="scale-grid" style="grid-template-columns: repeat(${Math.min(cols, 7)}, 1fr);" id="scale-${m.id}">`;
          for (let i = m.min; i <= m.max; i++) {
            const label = m.labels ? m.labels[i - m.min] || "" : "";
            html += `<div class="scale-item" data-metric="${m.id}" data-val="${i}" onclick="selectScale('${m.id}', ${i})"><div class="scale-num">${i}</div>${label ? `<span>${escapeHtml(label)}</span>` : ""}</div>`;
          }
          html += '</div>';
        } else if (m.type === "toggle") {
          metricValues[m.id] = false;
          const trackColor = m.dangerColor ? "var(--danger)" : "var(--brand-500)";
          html += `
            <div class="toggle-row">
              <span class="toggle-label">${escapeHtml(m.label)}</span>
              <label class="toggle-switch">
                <input type="checkbox" id="toggle-${m.id}" onchange="metricValues['${m.id}']=this.checked">
                <div class="toggle-track" style="--active-color:${trackColor}"></div>
                <div class="toggle-thumb"></div>
              </label>
            </div>`;
        }

        html += '</div>';
      });

      container.innerHTML = html;

      // トグルのcheckedスタイル修正
      document.querySelectorAll('.toggle-switch input').forEach((input) => {
        const track = input.nextElementSibling;
        const activeColor = track.style.getPropertyValue('--active-color') || 'var(--danger)';
        input.addEventListener('change', () => { track.style.background = input.checked ? activeColor : ''; });
      });
    }

    function adjustCounter(id, delta, min, max) {
      metricValues[id] = Math.max(min, Math.min(max, (metricValues[id] || 0) + delta));
      document.getElementById(`val-${id}`).textContent = metricValues[id];
    }

    function selectScale(id, val) {
      metricValues[id] = val;
      document.querySelectorAll(`[data-metric="${id}"]`).forEach((el) => {
        el.classList.toggle("selected", parseInt(el.dataset.val) === val);
      });
    }

    function loadExisting(log, metrics) {
      metrics.forEach((m) => {
        if (log[m.id] != null) {
          metricValues[m.id] = log[m.id];
          if (m.type === "counter") {
            document.getElementById(`val-${m.id}`).textContent = log[m.id];
          } else if (m.type === "scale") {
            selectScale(m.id, log[m.id]);
          } else if (m.type === "toggle") {
            const cb = document.getElementById(`toggle-${m.id}`);
            if (cb) { cb.checked = !!log[m.id]; cb.dispatchEvent(new Event("change")); }
          }
        }
      });
      if (log.memo) document.getElementById("memo").value = log.memo;
      document.getElementById("delete-section").classList.remove("hidden");
    }

    function setupSaveDelete() {
      document.getElementById("save-btn").addEventListener("click", async () => {
        const btn = document.getElementById("save-btn");
        btn.disabled = true; btn.textContent = "保存中...";
        const data = { date: targetDate, ...metricValues, memo: document.getElementById("memo").value };
        try {
          await apiPost("/api/symptoms", data);
        } catch (e) { console.warn("Save (mock):", e.message); }
        document.getElementById("done-overlay").classList.remove("hidden");
      });

      document.getElementById("delete-btn").addEventListener("click", async () => {
        if (!confirm("この日の記録を削除しますか？")) return;
        try { await apiDelete(`/api/symptoms/${targetDate}`); } catch (e) {}
        location.href = `/symptom-log.html?disease=${getDiseaseId()}`;
      });
    }
  </script>
</body>
</html>
