<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>おくすり追加 - よりそい PHR</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .master-list { max-height: 200px; overflow-y: auto; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); background: var(--white); margin-top: 4px; }
    .master-item { padding: 10px 12px; border-bottom: 1px solid var(--gray-100); cursor: pointer; font-size: 14px; }
    .master-item:active { background: var(--brand-50); }
    .master-item-name { font-weight: 600; }
    .master-item-generic { font-size: 12px; color: var(--gray-500); }
    .master-category-header { padding: 6px 12px; background: var(--gray-100); font-size: 12px; font-weight: 700; color: var(--gray-600); position: sticky; top: 0; }
  </style>
</head>
<body>
  <div class="header" id="page-header">
    <button class="header-back" onclick="location.href='/medications.html'">&larr;</button>
    <h1 id="page-title">おくすり追加</h1>
  </div>

  <div class="content">
    <div id="master-section">
      <div class="form-group">
        <label class="form-label">おくすりを選ぶ</label>
        <input type="text" class="form-input" id="med-search" placeholder="薬名で検索">
        <div class="master-list hidden" id="master-list"></div>
      </div>
    </div>
    <form id="med-form">
      <div class="form-group"><label class="form-label">薬名 *</label><input type="text" class="form-input" id="med-name" required></div>
      <div class="form-group"><label class="form-label">一般名</label><input type="text" class="form-input" id="med-generic"></div>
      <div class="form-group"><label class="form-label">カテゴリ</label><select class="form-select" id="med-category"></select></div>
      <div class="form-group"><label class="form-label">剤形</label><input type="text" class="form-input" id="med-form-type"></div>
      <div class="form-group"><label class="form-label">開始日 *</label><input type="date" class="form-input" id="med-start" required></div>
      <div class="form-group"><label class="form-label">終了日（服用中なら空欄）</label><input type="date" class="form-input" id="med-end"></div>
      <div class="form-group"><label class="form-label">変更理由</label><input type="text" class="form-input" id="med-reason"></div>
      <div class="form-group"><label class="form-label">メモ</label><textarea class="form-textarea" id="med-notes"></textarea></div>
      <div class="form-group">
        <label class="form-label">写真（お薬手帳のページなど・任意）</label>
        <div id="photo-preview-wrap"></div>
        <button type="button" class="btn btn-outline" id="btn-photo" style="font-size:13px;padding:10px;">📷 写真を添付</button>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">追加する</button>
      <div id="delete-section" class="hidden mt-16"><button type="button" class="btn btn-danger" id="delete-btn">このおくすりを削除</button></div>
    </form>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="/js/liff-init.js"></script>
  <script src="/js/photo-upload.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const medId = params.get("id");
    const isEditMode = !!medId;
    let masterData = null;
    let attachedPhoto = null;

    function renderPhotoPreview() {
      const wrap = document.getElementById("photo-preview-wrap");
      if (attachedPhoto) {
        wrap.innerHTML = `<div style="position:relative;display:inline-block;margin-bottom:8px;">
          <img src="${attachedPhoto}" style="max-width:100%;max-height:200px;border-radius:8px;">
          <button type="button" onclick="removePhoto()" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;">&times;</button>
        </div>`;
      } else {
        wrap.innerHTML = "";
      }
    }
    function removePhoto() { attachedPhoto = null; renderPhotoPreview(); }

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const { template } = await initLiff();
        if (template.color) document.getElementById("page-header").style.background = `linear-gradient(135deg, ${template.color}, ${template.color}dd)`;

        masterData = await apiGet("/api/master/medications");

        // カテゴリ選択肢を薬剤マスタから生成
        const catSelect = document.getElementById("med-category");
        (masterData.categories || []).forEach((c) => {
          const opt = document.createElement("option");
          opt.value = c.id; opt.textContent = c.name;
          catSelect.appendChild(opt);
        });

        setupMasterSearch();

        if (isEditMode) {
          document.getElementById("page-title").textContent = "おくすり編集";
          document.getElementById("submit-btn").textContent = "更新する";
          document.getElementById("delete-section").classList.remove("hidden");
          document.getElementById("master-section").classList.add("hidden");
          await loadMedication();
        }

        document.getElementById("btn-photo").addEventListener("click", () => {
          showPhotoPicker({
            onSelect: (dataUri) => { attachedPhoto = dataUri; renderPhotoPreview(); },
          });
        });
      } catch (err) { console.error("Init error:", err); }
    });

    function setupMasterSearch() {
      const searchInput = document.getElementById("med-search");
      const listEl = document.getElementById("master-list");
      searchInput.addEventListener("focus", () => { renderMasterList(""); listEl.classList.remove("hidden"); });
      searchInput.addEventListener("input", (e) => renderMasterList(e.target.value));
      searchInput.addEventListener("blur", () => setTimeout(() => listEl.classList.add("hidden"), 200));
    }

    function renderMasterList(query) {
      const listEl = document.getElementById("master-list");
      if (!masterData) return;
      const q = query.toLowerCase();
      let html = "";
      masterData.categories.forEach((cat) => {
        const medsInCat = masterData.medications.filter((m) => {
          if (m.category !== cat.id) return false;
          if (!q) return true;
          return m.genericName.toLowerCase().includes(q) || m.brandNames.some((b) => b.toLowerCase().includes(q));
        });
        if (medsInCat.length === 0) return;
        html += `<div class="master-category-header">${cat.name}</div>`;
        medsInCat.forEach((m) => {
          m.brandNames.forEach((brand) => {
            if (q && !brand.toLowerCase().includes(q) && !m.genericName.toLowerCase().includes(q)) return;
            html += `<div class="master-item" data-brand="${brand}" data-generic="${m.genericName}" data-category="${m.category}" data-form="${m.dosageForms.join("、")}">
              <div class="master-item-name">${brand}</div><div class="master-item-generic">${m.genericName} / ${m.dosageForms.join("、")}</div></div>`;
          });
        });
      });
      if (!html) html = '<div class="master-item text-muted">見つかりません</div>';
      listEl.innerHTML = html;
      listEl.querySelectorAll(".master-item[data-brand]").forEach((el) => {
        el.addEventListener("mousedown", (e) => {
          e.preventDefault();
          document.getElementById("med-name").value = el.dataset.brand;
          document.getElementById("med-generic").value = el.dataset.generic;
          document.getElementById("med-category").value = el.dataset.category;
          document.getElementById("med-form-type").value = el.dataset.form;
          document.getElementById("med-search").value = "";
          listEl.classList.add("hidden");
        });
      });
    }

    async function loadMedication() {
      const meds = await apiGet("/api/medications");
      const med = meds.find((m) => m.id === medId);
      if (!med) { alert("おくすりが見つかりません"); location.href = "/medications.html"; return; }
      document.getElementById("med-name").value = med.name || "";
      document.getElementById("med-generic").value = med.genericName || "";
      document.getElementById("med-category").value = med.category || "";
      document.getElementById("med-form-type").value = med.dosageForm || "";
      document.getElementById("med-start").value = med.startDate || "";
      document.getElementById("med-end").value = med.endDate || "";
      document.getElementById("med-reason").value = med.changeReason || "";
      document.getElementById("med-notes").value = med.sideNotes || "";
      if (med.photoUrl) { attachedPhoto = med.photoUrl; renderPhotoPreview(); }
    }

    document.getElementById("med-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true; btn.textContent = "保存中...";
      const data = {
        name: document.getElementById("med-name").value, genericName: document.getElementById("med-generic").value,
        category: document.getElementById("med-category").value, dosageForm: document.getElementById("med-form-type").value,
        startDate: document.getElementById("med-start").value, endDate: document.getElementById("med-end").value || null,
        changeReason: document.getElementById("med-reason").value, sideNotes: document.getElementById("med-notes").value,
        photoUrl: attachedPhoto,
      };
      try {
        if (isEditMode) await apiPut(`/api/medications/${medId}`, data); else await apiPost("/api/medications", data);
        location.href = "/medications.html";
      } catch (err) { alert("保存に失敗しました"); btn.disabled = false; btn.textContent = isEditMode ? "更新する" : "追加する"; }
    });

    document.getElementById("delete-btn").addEventListener("click", async () => {
      if (!confirm("このおくすりを削除しますか？")) return;
      try { await apiDelete(`/api/medications/${medId}`); location.href = "/medications.html"; } catch (err) { alert("削除に失敗しました"); }
    });
  </script>
</body>
</html>
