<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>イベント追加 - よりそい PHR</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="header" id="page-header">
    <button class="header-back" onclick="location.href='/timeline.html'">&larr;</button>
    <h1 id="page-title">イベント追加</h1>
  </div>

  <div class="content">
    <form id="event-form">
      <div class="form-group">
        <label class="form-label">日付 *</label>
        <input type="date" class="form-input" id="event-date" required>
      </div>
      <div class="form-group">
        <label class="form-label">カテゴリ</label>
        <select class="form-select" id="event-category"></select>
      </div>
      <div class="form-group">
        <label class="form-label">タイトル *</label>
        <input type="text" class="form-input" id="event-title" placeholder="例: 診断確定" required>
      </div>
      <div class="form-group">
        <label class="form-label">詳細メモ</label>
        <textarea class="form-textarea" id="event-detail" placeholder="例: ○○病院にて"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">写真（任意）</label>
        <div id="photo-preview-wrap"></div>
        <button type="button" class="btn btn-outline" id="btn-photo" style="font-size:13px;padding:10px;">📷 写真を添付</button>
      </div>
      <button type="submit" class="btn btn-primary" id="submit-btn">追加する</button>
      <div id="delete-section" class="hidden mt-16">
        <button type="button" class="btn btn-danger" id="delete-btn">このイベントを削除</button>
      </div>
    </form>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="/js/liff-init.js"></script>
  <script src="/js/photo-upload.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const eventId = params.get("id");
    const isEditMode = !!eventId;
    let attachedPhoto = null;

    function renderPhotoPreview() {
      const wrap = document.getElementById("photo-preview-wrap");
      if (attachedPhoto) {
        wrap.innerHTML = `<div style="position:relative;display:inline-block;margin-bottom:8px;">
          <img src="${attachedPhoto}" style="max-width:100%;max-height:200px;border-radius:8px;">
          <button type="button" onclick="removePhoto()" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;">&times;</button>
        </div>`;
      } else {
        wrap.innerHTML = "";
      }
    }
    function removePhoto() { attachedPhoto = null; renderPhotoPreview(); }

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const { template } = await initLiff();
        if (template.color) document.getElementById("page-header").style.background = `linear-gradient(135deg, ${template.color}, ${template.color}dd)`;

        // カテゴリ選択肢をテンプレートから生成
        const select = document.getElementById("event-category");
        (template.timelineCategories || []).forEach((cat) => {
          const opt = document.createElement("option");
          opt.value = cat.id; opt.textContent = cat.label;
          if (cat.id === "other") opt.selected = true;
          select.appendChild(opt);
        });

        if (isEditMode) {
          document.getElementById("page-title").textContent = "イベント編集";
          document.getElementById("submit-btn").textContent = "更新する";
          document.getElementById("delete-section").classList.remove("hidden");
          await loadEvent();
        }

        document.getElementById("btn-photo").addEventListener("click", () => {
          showPhotoPicker({
            onSelect: (dataUri) => { attachedPhoto = dataUri; renderPhotoPreview(); },
          });
        });
      } catch (err) { console.error("Init error:", err); }
    });

    async function loadEvent() {
      const events = await apiGet("/api/timeline");
      const ev = events.find((e) => e.id === eventId);
      if (!ev) { alert("イベントが見つかりません"); location.href = "/timeline.html"; return; }
      document.getElementById("event-date").value = ev.date || "";
      document.getElementById("event-category").value = ev.category || "other";
      document.getElementById("event-title").value = ev.title || "";
      document.getElementById("event-detail").value = ev.detail || "";
      if (ev.photoUrl) { attachedPhoto = ev.photoUrl; renderPhotoPreview(); }
    }

    document.getElementById("event-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled = true; btn.textContent = "保存中...";
      const data = {
        date: document.getElementById("event-date").value,
        category: document.getElementById("event-category").value,
        title: document.getElementById("event-title").value,
        detail: document.getElementById("event-detail").value,
        photoUrl: attachedPhoto,
      };
      try {
        if (isEditMode) await apiPut(`/api/timeline/${eventId}`, data);
        else await apiPost("/api/timeline", data);
        location.href = "/timeline.html";
      } catch (err) {
        alert("保存に失敗しました: " + err.message);
        btn.disabled = false; btn.textContent = isEditMode ? "更新する" : "追加する";
      }
    });

    document.getElementById("delete-btn").addEventListener("click", async () => {
      if (!confirm("このイベントを削除しますか？")) return;
      try { await apiDelete(`/api/timeline/${eventId}`); location.href = "/timeline.html"; }
      catch (err) { alert("削除に失敗しました"); }
    });
  </script>
</body>
</html>
