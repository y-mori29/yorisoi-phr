<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>トイレさがし - よりそい PHR</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { padding-bottom: 0; }
    .content { padding: 0; padding-bottom: 0; }

    #map {
      width: 100%; height: calc(100vh - 52px - 72px);
    }

    /* コントロールバー */
    .map-controls {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px; background: var(--white); padding: 12px 16px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1); z-index: 50;
      display: flex; align-items: center; gap: 12px;
    }
    .ctrl-btn {
      flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      border: none; cursor: pointer; text-align: center; transition: all 0.15s;
    }
    .ctrl-btn:active { transform: scale(0.96); }
    .ctrl-btn-primary { background: var(--teal); color: var(--white); }
    .ctrl-btn-outline { background: var(--white); color: var(--teal-dark); border: 2px solid var(--teal); }

    /* 情報パネル */
    .info-panel {
      position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
      width: calc(100% - 32px); max-width: 398px;
      background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 14px 16px; z-index: 60;
    }
    .info-panel-title { font-size: 15px; font-weight: 700; }
    .info-panel-detail { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
    .info-panel-dist { font-size: 13px; color: var(--teal-dark); font-weight: 600; margin-top: 4px; }
    .info-panel-close {
      position: absolute; top: 8px; right: 12px; background: none; border: none;
      font-size: 18px; color: var(--gray-400); cursor: pointer;
    }

    /* GPS状態 */
    .gps-status {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: var(--white); padding: 8px 16px;
      border-radius: 20px; font-size: 13px; z-index: 60;
    }

    /* モックモード通知 */
    .mock-banner {
      background: #fef3c7; color: #92400e; padding: 8px 16px; font-size: 12px;
      text-align: center; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="header-back" onclick="location.href='/'">&larr;</button>
    <h1>トイレさがし</h1>
  </div>

  <div id="mock-banner" class="mock-banner hidden">
    デモモード: サンプルデータを表示しています
  </div>

  <div class="content">
    <div id="map"></div>
  </div>

  <div class="gps-status hidden" id="gps-status">位置情報を取得中...</div>

  <!-- 施設情報パネル -->
  <div class="info-panel hidden" id="info-panel">
    <button class="info-panel-close" id="info-close">&times;</button>
    <div class="info-panel-title" id="info-title"></div>
    <div class="info-panel-detail" id="info-detail"></div>
    <div class="info-panel-dist" id="info-dist"></div>
  </div>

  <!-- コントロール -->
  <div class="map-controls">
    <button class="ctrl-btn ctrl-btn-primary" id="btn-search">このエリアで再検索</button>
    <button class="ctrl-btn ctrl-btn-outline" id="btn-myloc">現在地</button>
  </div>

  <!-- Google Maps API（本番時にキーを設定） -->
  <script>
    // --- 設定 ---
    const MAPS_API_KEY = ""; // 本番時に設定
    const SEARCH_RADIUS = 500; // メートル
    const USE_MOCK = !MAPS_API_KEY;

    let map, userMarker, placesService;
    let currentPos = null;
    let markers = [];

    // --- モック: サンプルトイレ位置（大阪駅周辺） ---
    const MOCK_CENTER = { lat: 34.7024, lng: 135.4959 };
    const MOCK_RESTROOMS = [
      { name: "JR大阪駅 改札内トイレ", lat: 34.7025, lng: 135.4956, type: "駅構内" },
      { name: "グランフロント大阪 1F", lat: 34.7055, lng: 135.4948, type: "商業施設" },
      { name: "ルクア大阪 B1F", lat: 34.7035, lng: 135.4943, type: "商業施設" },
      { name: "ヨドバシカメラ梅田 3F", lat: 34.7030, lng: 135.4975, type: "商業施設" },
      { name: "大阪マルビル 1F", lat: 34.6995, lng: 135.4955, type: "ビル" },
      { name: "阪急三番街 B2F", lat: 34.7048, lng: 135.4990, type: "商業施設" },
      { name: "ディアモール大阪 公衆トイレ", lat: 34.7008, lng: 135.4965, type: "地下街" },
      { name: "大丸梅田店 4F", lat: 34.7020, lng: 135.4935, type: "百貨店" },
      { name: "うめきた公園 公衆トイレ", lat: 34.7065, lng: 135.4930, type: "公園" },
      { name: "阪急梅田駅 2F トイレ", lat: 34.7050, lng: 135.4968, type: "駅構内" },
    ];

    // --- 初期化 ---
    document.addEventListener("DOMContentLoaded", () => {
      if (USE_MOCK) {
        document.getElementById("mock-banner").classList.remove("hidden");
        initMockMap();
      } else {
        // Google Maps APIを動的に読み込み
        const script = document.createElement("script");
        script.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_API_KEY}&libraries=places&callback=initRealMap`;
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
      }
    });

    // ========================================
    // モックマップ（API キーなしでも動作）
    // ========================================
    function initMockMap() {
      const mapEl = document.getElementById("map");
      mapEl.style.background = "#e8f4ea";
      mapEl.style.position = "relative";
      mapEl.style.overflow = "hidden";

      // シンプルなグリッド地図を描画
      let html = `
        <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column;">
          <div style="position:relative; width:100%; height:100%;">
            <!-- グリッド背景 -->
            <svg width="100%" height="100%" style="position:absolute; inset:0;">
              ${generateGridLines()}
            </svg>
            <!-- トイレマーカー -->
            <div id="mock-markers" style="position:absolute; inset:0;"></div>
          </div>
        </div>`;
      mapEl.innerHTML = html;

      renderMockMarkers();

      // ボタン
      document.getElementById("btn-search").addEventListener("click", () => {
        showGpsStatus("サンプルデータを表示しています");
      });
      document.getElementById("btn-myloc").addEventListener("click", () => {
        showGpsStatus("デモモード: 大阪駅周辺を表示中");
      });
    }

    function generateGridLines() {
      let svg = "";
      for (let i = 0; i <= 20; i++) {
        const pct = i * 5;
        svg += `<line x1="${pct}%" y1="0" x2="${pct}%" y2="100%" stroke="#c8e6c9" stroke-width="1"/>`;
        svg += `<line x1="0" y1="${pct}%" x2="100%" y2="${pct}%" stroke="#c8e6c9" stroke-width="1"/>`;
      }
      // 道路っぽい線
      svg += `<line x1="0" y1="40%" x2="100%" y2="40%" stroke="#fff" stroke-width="6"/>`;
      svg += `<line x1="50%" y1="0" x2="50%" y2="100%" stroke="#fff" stroke-width="6"/>`;
      svg += `<line x1="20%" y1="0" x2="80%" y2="100%" stroke="#fff" stroke-width="3"/>`;
      return svg;
    }

    function renderMockMarkers() {
      const container = document.getElementById("mock-markers");
      let html = '';

      // 現在地マーカー
      html += `
        <div style="position:absolute; left:50%; top:40%; transform:translate(-50%,-50%); z-index:10;">
          <div style="width:16px; height:16px; background:#4285f4; border:3px solid #fff; border-radius:50%; box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>
          <div style="width:40px; height:40px; background:rgba(66,133,244,0.15); border-radius:50%; position:absolute; top:-12px; left:-12px; animation: pulse 2s infinite;"></div>
        </div>`;

      // トイレマーカー
      MOCK_RESTROOMS.forEach((r, i) => {
        const left = 15 + (i % 5) * 17;
        const top = 15 + Math.floor(i / 5) * 35 + (i % 3) * 8;
        html += `
          <div class="mock-pin" style="position:absolute; left:${left}%; top:${top}%; transform:translate(-50%,-100%); cursor:pointer; z-index:5;"
               onclick="showMockInfo(${i})">
            <div style="background:var(--teal); color:#fff; width:32px; height:32px; border-radius:50% 50% 50% 0; transform:rotate(-45deg); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,0.2);">
              <span style="transform:rotate(45deg); font-size:14px;">&#128702;</span>
            </div>
          </div>`;
      });

      container.innerHTML = html;

      // パルスアニメーション追加
      const style = document.createElement("style");
      style.textContent = "@keyframes pulse { 0%,100% { transform: scale(1); opacity:0.6; } 50% { transform: scale(1.5); opacity:0.2; } }";
      document.head.appendChild(style);
    }

    function showMockInfo(idx) {
      const r = MOCK_RESTROOMS[idx];
      const dist = Math.floor(Math.random() * 400 + 50);
      document.getElementById("info-title").textContent = r.name;
      document.getElementById("info-detail").textContent = r.type;
      document.getElementById("info-dist").textContent = `約 ${dist}m`;
      document.getElementById("info-panel").classList.remove("hidden");
    }

    // ========================================
    // 本番マップ（Google Maps API）
    // ========================================
    function initRealMap() {
      const gpsStatus = document.getElementById("gps-status");
      gpsStatus.classList.remove("hidden");

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          gpsStatus.classList.add("hidden");
          createMap(currentPos);
          searchNearby(currentPos);
          watchPosition();
        },
        (err) => {
          gpsStatus.textContent = "GPS取得失敗: " + err.message;
          // フォールバック: 大阪駅
          currentPos = MOCK_CENTER;
          createMap(currentPos);
          searchNearby(currentPos);
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function createMap(center) {
      map = new google.maps.Map(document.getElementById("map"), {
        center,
        zoom: 16,
        mapTypeId: "roadmap",
        disableDefaultUI: true,
        zoomControl: true,
        styles: [
          { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
        ],
      });

      userMarker = new google.maps.Marker({
        position: center,
        map,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8,
          fillColor: "#4285f4",
          fillOpacity: 1,
          strokeColor: "#fff",
          strokeWeight: 3,
        },
        title: "現在地",
      });

      placesService = new google.maps.places.PlacesService(map);

      // ボタンイベント
      document.getElementById("btn-search").addEventListener("click", () => {
        const center = map.getCenter();
        searchNearby({ lat: center.lat(), lng: center.lng() });
      });

      document.getElementById("btn-myloc").addEventListener("click", () => {
        if (currentPos) {
          map.panTo(currentPos);
          searchNearby(currentPos);
        }
      });
    }

    function searchNearby(location) {
      clearMarkers();
      placesService.nearbySearch(
        { location, radius: SEARCH_RADIUS, keyword: "トイレ" },
        (results, status) => {
          if (status === google.maps.places.PlacesServiceStatus.OK) {
            results.forEach((place) => addPlaceMarker(place));
          }
        }
      );
      // 「公衆トイレ」でも検索
      placesService.nearbySearch(
        { location, radius: SEARCH_RADIUS, keyword: "公衆トイレ" },
        (results, status) => {
          if (status === google.maps.places.PlacesServiceStatus.OK) {
            results.forEach((place) => addPlaceMarker(place));
          }
        }
      );
    }

    function addPlaceMarker(place) {
      // 重複チェック
      if (markers.some((m) => m.placeId === place.place_id)) return;

      const marker = new google.maps.Marker({
        position: place.geometry.location,
        map,
        icon: {
          url: "data:image/svg+xml," + encodeURIComponent(
            '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">' +
            '<circle cx="16" cy="16" r="14" fill="#86c8bc" stroke="#fff" stroke-width="2"/>' +
            '<text x="16" y="21" text-anchor="middle" font-size="14">&#128702;</text></svg>'
          ),
          scaledSize: new google.maps.Size(32, 32),
        },
        title: place.name,
      });
      marker.placeId = place.place_id;

      marker.addListener("click", () => {
        const dist = calcDistance(currentPos, {
          lat: place.geometry.location.lat(),
          lng: place.geometry.location.lng(),
        });
        document.getElementById("info-title").textContent = place.name;
        document.getElementById("info-detail").textContent = place.vicinity || "";
        document.getElementById("info-dist").textContent = `約 ${dist}m`;
        document.getElementById("info-panel").classList.remove("hidden");
      });

      markers.push(marker);
    }

    function clearMarkers() {
      markers.forEach((m) => m.setMap(null));
      markers = [];
    }

    function watchPosition() {
      navigator.geolocation.watchPosition(
        (pos) => {
          currentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          if (userMarker) userMarker.setPosition(currentPos);
        },
        () => {},
        { enableHighAccuracy: true }
      );
    }

    function calcDistance(a, b) {
      const R = 6371000;
      const dLat = ((b.lat - a.lat) * Math.PI) / 180;
      const dLng = ((b.lng - a.lng) * Math.PI) / 180;
      const s = Math.sin(dLat / 2) ** 2 +
        Math.cos((a.lat * Math.PI) / 180) * Math.cos((b.lat * Math.PI) / 180) * Math.sin(dLng / 2) ** 2;
      return Math.round(2 * R * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s)));
    }

    // --- GPS状態表示 ---
    function showGpsStatus(msg) {
      const el = document.getElementById("gps-status");
      el.textContent = msg;
      el.classList.remove("hidden");
      setTimeout(() => el.classList.add("hidden"), 3000);
    }

    // --- 情報パネル閉じる ---
    document.getElementById("info-close").addEventListener("click", () => {
      document.getElementById("info-panel").classList.add("hidden");
    });
  </script>
</body>
</html>
