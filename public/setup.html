<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>はじめての設定 - よりそい PHR</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .setup-hero {
      text-align: center; padding: 40px 20px 32px;
      background: linear-gradient(135deg, var(--brand-500), var(--brand-600));
      color: var(--white); margin: -16px -16px 20px; border-radius: 0 0 24px 24px;
    }
    .setup-hero h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.5px; }
    .setup-hero p { font-size: 14px; opacity: 0.9; }

    .disease-list { display: flex; flex-direction: column; gap: 10px; }
    .disease-option {
      display: flex; align-items: center; gap: 14px; padding: 16px; background: var(--white);
      border-radius: var(--radius); border: 2px solid var(--gray-200); cursor: pointer;
      transition: all 0.15s; text-decoration: none; color: var(--gray-800);
    }
    .disease-option:active { transform: scale(0.98); }
    .disease-option.selected { border-color: var(--brand-500); background: var(--brand-50); }
    .disease-option-icon { font-size: 32px; flex-shrink: 0; color: var(--brand-600); line-height: 1; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
    .disease-option-icon .material-symbols-outlined { font-size: 32px; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 40; }
    .disease-option.selected .disease-option-icon { color: var(--brand-700); }
    .disease-option-name { font-size: 16px; font-weight: 700; }
    .disease-option-desc { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .disease-option-check { margin-left: auto; font-size: 20px; color: var(--brand-500); opacity: 0; transition: opacity 0.2s; }
    .disease-option.selected .disease-option-check { opacity: 1; }

    .setup-footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; padding: 12px 16px; background: var(--white); box-shadow: 0 -2px 12px rgba(0,0,0,0.08); }
  </style>
</head>
<body>
  <div class="content" style="padding-bottom: 80px;">
    <div class="setup-hero">
      <h2>よりそい</h2>
      <p>あなたの治療をサポートします</p>
    </div>
    <h3 style="font-size:16px; margin-bottom:4px;">あなたの病気を選んでください</h3>
    <p class="text-sm text-muted mb-8">あとから設定で変更できます</p>
    <div class="disease-list" id="disease-list">
      <div class="loading"><div class="loading-spinner"></div></div>
    </div>
  </div>

  <!-- フッターボタン -->
  <div class="setup-footer">
    <button class="btn btn-primary" id="next-btn" disabled>はじめる</button>
  </div>

  <script src="/js/liff-init.js"></script>
  <script>
    let selectedDisease = null;
    let allTemplates = [];

    document.addEventListener("DOMContentLoaded", async () => {
      // LIFF不要で動作させる（セットアップ画面は認証前）
      _idToken = "setup";
      _diseaseId = "uc";

      try {
        const res = await fetch("/api/templates");
        allTemplates = await res.json();
        renderDiseaseList();
      } catch (e) {
        console.error(e);
      }

      document.getElementById("next-btn").addEventListener("click", () => {
        if (selectedDisease) finishSetup();
      });
    });

    function renderDiseaseList() {
      const container = document.getElementById("disease-list");
      container.innerHTML = allTemplates.map((t) => `
        <div class="disease-option" data-id="${t.id}" onclick="selectDisease('${t.id}')">
          <div class="disease-option-icon"><span class="material-symbols-outlined">${t.icon}</span></div>
          <div>
            <div class="disease-option-name">${t.name}</div>
            <div class="disease-option-desc">${t.shortName}</div>
          </div>
          <div class="disease-option-check">&#10003;</div>
        </div>
      `).join("");
    }

    function selectDisease(id) {
      selectedDisease = id;
      document.querySelectorAll(".disease-option").forEach((el) => {
        el.classList.toggle("selected", el.dataset.id === id);
      });
      const btn = document.getElementById("next-btn");
      btn.disabled = false;
    }

    function finishSetup() {
      // 選択結果を保存（モジュールはテンプレ enabled をそのまま使う：明示保存しない）
      localStorage.setItem("yorisoi_disease", selectedDisease);
      localStorage.removeItem("yorisoi_modules"); // 旧データの掃除
      localStorage.setItem("yorisoi_setup_done", "1");
      if (!localStorage.getItem("yorisoi_mode")) {
        localStorage.setItem("yorisoi_mode", "simple");
      }
      location.href = `/?disease=${selectedDisease}`;
    }
  </script>
</body>
</html>
