<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>よりそい</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />
  <style>
    body { background: var(--gray-50); padding: 0; min-height: 100vh; display: flex; flex-direction: column; }
    .simple-header {
      padding: 32px 20px 24px;
      background: linear-gradient(135deg, var(--brand-400, #f4a7b0), var(--brand-500));
      color: var(--white);
      text-align: center;
      border-radius: 0 0 28px 28px;
    }
    .simple-header h1 { font-size: 28px; font-weight: 700; letter-spacing: 2px; }
    .simple-header .subtitle { font-size: 13px; opacity: 0.9; margin-top: 6px; letter-spacing: 1px; }

    .menu-area { flex: 1; padding: 28px 20px; display: flex; flex-direction: column; gap: 18px; }
    .home-tagline {
      text-align: center; padding: 20px 20px 0;
      font-size: 13px; color: var(--gray-600); letter-spacing: 0.5px; line-height: 1.7;
    }

    .big-button {
      display: flex; align-items: center; gap: 18px;
      padding: 28px 22px;
      background: var(--white);
      border: 3px solid var(--brand-200);
      border-radius: 24px;
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--gray-800);
      transition: all 0.15s;
    }
    .big-button:active { transform: scale(0.98); }
    .big-button:hover { border-color: var(--brand-400); background: var(--brand-50); }
    .big-button .icon-circle {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--brand-100);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .big-button .icon-circle .material-symbols-outlined {
      font-size: 36px;
      color: var(--brand-600);
    }
    .big-button .label-area { flex: 1; }
    .big-button .label {
      font-size: 24px; font-weight: 700; letter-spacing: 2px;
      line-height: 1.2;
    }
    .big-button .description {
      font-size: 13px; color: var(--gray-500); margin-top: 6px; letter-spacing: 0.5px;
    }

    /* フッターエリア: 緊急カード + 設定 を2ボタン */
    .footer-area {
      padding: 16px 20px 24px;
      display: flex; gap: 12px; justify-content: center;
    }
    .footer-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 20px;
      background: var(--white);
      border: 2px solid var(--gray-300);
      border-radius: 24px;
      color: var(--gray-700);
      font-size: 14px; font-weight: 600; letter-spacing: 1px;
      text-decoration: none;
      transition: all 0.15s;
    }
    .footer-btn:active { transform: scale(0.97); }
    .footer-btn .material-symbols-outlined { font-size: 18px; }
    .footer-btn.assurance {
      border-color: var(--brand-300);
      color: var(--brand-700);
    }
    .footer-btn.assurance:hover { background: var(--brand-50); }
    .footer-btn.assurance .material-symbols-outlined { color: var(--brand-600); }

    .loading-mask { padding: 40px; text-align: center; color: var(--gray-500); }
  </style>
</head>
<body>
  <div class="simple-header">
    <h1>よりそい</h1>
    <p class="subtitle" id="header-sub">あなたの治療記録</p>
  </div>

  <p class="home-tagline">毎日の体調も、受診の記録も、ここで全部。</p>

  <div class="menu-area" id="menu-area">
    <div class="loading-mask">
      <div class="loading-spinner"></div>
      <p class="text-sm mt-8">読み込み中...</p>
    </div>
  </div>

  <div class="footer-area">
    <a class="footer-btn assurance" id="emergency-link" href="/emergency-card.html">
      <span class="material-symbols-outlined">badge</span>
      あんしんカード
    </a>
    <a class="footer-btn" id="settei-link" href="/simple/settings.html">
      <span class="material-symbols-outlined">apps</span>
      その他
    </a>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="/js/liff-init.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      // 初回セットアップ未完了ならセットアップへ
      if (!localStorage.getItem("yorisoi_setup_done") && !new URLSearchParams(location.search).get("disease")) {
        location.href = "/setup.html";
        return;
      }

      try {
        const { template, diseaseId } = await initLiff();
        const sub = template.name ? `${template.name} の記録` : "あなたの治療記録";
        document.getElementById("header-sub").textContent = sub;

        const q = "?disease=" + encodeURIComponent(diseaseId);
        const buttons = [
          { href: "/simple/record.html" + q,   icon: "edit_note",       label: "きろくする",   desc: "受診や体調をのこす" },
          { href: "/simple/calendar.html" + q, icon: "calendar_month",  label: "ふりかえる",   desc: "これまでの記録を見る" },
          { href: "/simple/show.html" + q,     icon: "co_present",      label: "みせる",       desc: "医師にパッと見せる" },
        ];
        const html = buttons.map(b => `
          <a class="big-button" href="${b.href}">
            <div class="icon-circle">
              <span class="material-symbols-outlined">${b.icon}</span>
            </div>
            <div class="label-area">
              <div class="label">${b.label}</div>
              <div class="description">${b.desc}</div>
            </div>
          </a>
        `).join("");
        document.getElementById("menu-area").innerHTML = html;
        document.getElementById("settei-link").href = "/simple/settings.html" + q;
        document.getElementById("emergency-link").href = "/emergency-card.html" + q + "&from=simple";
      } catch (err) {
        console.error("Init error:", err);
        document.getElementById("menu-area").innerHTML =
          '<p class="text-sm" style="color:var(--danger); text-align:center;">読み込みに失敗しました</p>';
      }
    });
  </script>
</body>
</html>
