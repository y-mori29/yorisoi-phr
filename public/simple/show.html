<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>みせる - よりそい</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />
  <style>
    .placeholder {
      text-align: center; padding: 60px 24px;
      background: var(--white); border-radius: 16px;
      border: 2px dashed var(--brand-200);
    }
    .placeholder .big-icon { font-size: 72px; color: var(--brand-300); }
    .placeholder h2 { font-size: 20px; margin-top: 12px; letter-spacing: 1.5px; }
    .placeholder p { font-size: 14px; color: var(--gray-600); line-height: 1.7; margin-top: 12px; letter-spacing: 0.5px; }
    .placeholder .next { font-size: 13px; color: var(--gray-500); margin-top: 16px; }
    .alt-link {
      display: block; text-align: center; padding: 12px;
      background: var(--brand-50); color: var(--brand-700);
      border-radius: 12px; text-decoration: none;
      font-size: 14px; font-weight: 600; margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="header-back" onclick="location.href='/simple/'+location.search">&larr;</button>
    <h1>みせる</h1>
  </div>

  <div class="content">
    <div class="placeholder">
      <span class="material-symbols-outlined big-icon">co_present</span>
      <h2>準備中です</h2>
      <p>
        医師に見せるための<br>
        「きょうのため」（このクリニック向け）と<br>
        「ぜんしんてき」（すべての診療科向け）の<br>
        2つの画面を準備中です。
      </p>
      <p class="next">いまは「くわしい」モードのサマリーがあります</p>
    </div>

    <a class="alt-link" href="/summary.html">→ 現在のサマリーを見る（詳細モード）</a>
  </div>

</html>
