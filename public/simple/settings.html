<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>設定 - よりそい</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" />
  <style>
    .settings-section { margin-bottom: 24px; }
    .settings-section-title {
      font-size: 13px; font-weight: 700; color: var(--gray-500); letter-spacing: 1.5px;
      margin-bottom: 8px; padding-left: 4px;
    }
    .settings-list {
      background: var(--white); border-radius: 16px; overflow: hidden;
      border: 2px solid var(--gray-200);
    }
    .settings-row {
      display: flex; align-items: center; gap: 12px;
      padding: 18px 16px;
      border-bottom: 1px solid var(--gray-100);
      text-decoration: none; color: var(--gray-800);
      cursor: pointer;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row:active { background: var(--gray-50); }
    .settings-row .material-symbols-outlined { color: var(--brand-500); font-size: 24px; }
    .settings-row .label { flex: 1; font-size: 16px; font-weight: 600; letter-spacing: 1px; }
    .settings-row .sub { font-size: 12px; color: var(--gray-500); margin-top: 2px; letter-spacing: 0.5px; }
    .settings-row .chevron { color: var(--gray-300); }

    .mode-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 4px;
      background: var(--gray-100);
      border-radius: 999px;
    }
    .mode-toggle button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      border-radius: 999px;
      font-size: 14px; font-weight: 600; letter-spacing: 1px;
      color: var(--gray-500);
      cursor: pointer;
    }
    .mode-toggle button.active {
      background: var(--brand-500);
      color: var(--white);
      box-shadow: var(--shadow-sm);
    }

    .mode-card {
      background: var(--white); border: 2px solid var(--gray-200);
      border-radius: 16px; padding: 18px;
    }
    .mode-card .desc {
      font-size: 12px; color: var(--gray-500); margin-top: 12px; line-height: 1.6;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="header">
    <button class="header-back" onclick="location.href='/simple/'+location.search">&larr;</button>
    <h1>設定</h1>
  </div>

  <div class="content">

    <div class="settings-section">
      <div class="settings-section-title">表示モード</div>
      <div class="mode-card">
        <div class="mode-toggle" id="mode-toggle">
          <button id="btn-simple" data-mode="simple">かんたん</button>
          <button id="btn-detail" data-mode="detail">くわしい</button>
        </div>
        <div class="desc" id="mode-desc"></div>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">記録</div>
      <div class="settings-list">
        <a class="settings-row" href="/simple/clinics.html">
          <span class="material-symbols-outlined">local_hospital</span>
          <div style="flex:1;">
            <div class="label">かかりつけ病院</div>
            <div class="sub">病院・診療科を登録</div>
          </div>
          <span class="material-symbols-outlined chevron">chevron_right</span>
        </a>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-section-title">アプリ</div>
      <div class="settings-list">
        <a class="settings-row" href="/setup.html">
          <span class="material-symbols-outlined">tune</span>
          <div style="flex:1;">
            <div class="label">病気の変更</div>
            <div class="sub">どの病気の記録をするか選び直す</div>
          </div>
          <span class="material-symbols-outlined chevron">chevron_right</span>
        </a>
      </div>
    </div>

  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js" defer></script>
  <script src="/js/liff-init.js"></script>
  <script>
    const MODE_DESC = {
      simple: "「かんたん」モードは大きな3つのボタン（きろくする／ふりかえる／みせる）でシンプルに操作できます。",
      detail: "「くわしい」モードはすべてのメニュー（症状記録・検査値・緊急カードなど）が表示されます。",
    };

    function applyToggleUI(mode) {
      document.getElementById("btn-simple").classList.toggle("active", mode === "simple");
      document.getElementById("btn-detail").classList.toggle("active", mode === "detail");
      document.getElementById("mode-desc").textContent = MODE_DESC[mode] || "";
    }

    document.addEventListener("DOMContentLoaded", async () => {
      try { await initLiff(); } catch (_) { /* デモモードでも動く */ }

      const current = getCurrentMode();
      applyToggleUI(current);

      document.querySelectorAll("#mode-toggle button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const newMode = btn.dataset.mode;
          setMode(newMode);
          applyToggleUI(newMode);
          // 詳細モードに切り替えたら / に飛ばして既存画面へ
          if (newMode === "detail") {
            location.href = "/" + location.search;
          }
        });
      });
    });
  </script>
</body>
</html>
